<header class="header">
  <div class="left">
    <button class="menu-btn" (click)="toggleSidebar()">☰</button>
    <div class="logo">ERGS</div>
  </div>

  <div class="right" (click)="toggleDropdown()">
    <img src="https://i.pravatar.cc/40" class="avatar" />
    <span class="username">Username</span>

    <div class="dropdown" *ngIf="isOpen">
      <div>Profile</div>
      <div (click)="logout()">Logout</div>
    </div>
  </div>
</header>
