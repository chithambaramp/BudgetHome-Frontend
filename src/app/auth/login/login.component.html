<div class="login-wrapper">

  <!-- Left Side Branding -->
  <div class="login-left">
    <div class="brand-section">
      <div class="logo-circle">
        <i class="fa-solid fa-wallet"></i>
      </div>

      <h1>Budget Home</h1>
      <p>
        Smart expense tracking and budget management for your daily life.
      </p>

      <div class="feature-list">
        <div class="feature-item">
          <i class="fa-solid fa-chart-pie"></i>
          <span>Track Expenses</span>
        </div>

        <div class="feature-item">
          <i class="fa-solid fa-wallet"></i>
          <span>Manage Budget</span>
        </div>

        <div class="feature-item">
          <i class="fa-solid fa-chart-line"></i>
          <span>Financial Insights</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Side Login -->
  <div class="login-right">

    <div class="login-card">

      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Login to continue managing your finances</p>
      </div>

      <form>

        <!-- Email -->
        <div class="form-group">
          <label>Email Address</label>

          <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" placeholder="Enter your email" />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Password</label>

          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input [type]="showPassword() ? 'text' : 'password'" placeholder="Enter your password" />
            <i class="password-toggle" [ngClass]="showPassword() ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'"
              (click)="togglePassword()">
            </i>
          </div>
        </div>

        <!-- Remember -->
        <div class="login-options">

          <label class="containerChkBox chkboxlabeltxt">Remember me
            <input type="checkbox" />
            <span class="checkmark"></span>
          </label>

          <a href="#">Forgot Password?</a>
        </div>

        <!-- Login Button -->
        <button type="submit" class="login-btn" (click)="onSubmit()" [disabled]="isLoading()">
          {{ isLoading() ? 'Loading...' : 'Login' }}
        </button>

      </form>

      <div class="login-footer">
        <span>Don't have an account?</span>
        <a href="#">Create Account</a>
      </div>

    </div>

  </div>

</div>
